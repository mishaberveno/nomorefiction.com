<!DOCTYPE html>
<html lang="en-CA">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preload" href="/assets/fonts/pitch-sans-medium.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/assets/fonts/pitch-sans-semibold.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/assets/fonts/pitch-sans-medium-italic.woff2" as="font" type="font/woff2" crossorigin>

    <title>{{ page.title }} | {{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description | escape }}">

    <link rel="icon" type="image/png" href="/assets/favicons/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicons/favicon.svg" />
    <link rel="shortcut icon" href="/assets/favicons/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="No More" />
    <link rel="manifest" href="/assets/favicons/site.webmanifest" />

    <meta property="og:type" content="{{ page.type | default: 'website' }}">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta property="og:title" content="{{ page.title }} | {{ site.title }}">
    <meta property="og:description" content="{{ page.description | default: site.description | escape }}">
    <meta property="og:image" content="{{ page.image | default: '/assets/social/on-dissonance.jpg' | absolute_url }}">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@mishaberveno">

    <link rel="stylesheet" href="/assets/css/app.css">
    <link rel="canonical" href="{{ page.url | absolute_url }}">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "No More Fiction",
      "url": "https://nomorefiction.com",
      "description": "Short stories and book reviews by Misha Berveno",
      "author": {
        "@type": "Person",
        "name": "Misha Berveno",
        "url": "https://berveno.com"
      }
    }
    </script>
</head>

<body>
    <header class="grid">
        <div class="content">
            <h1>
                <a href="/">No</a><br>
                <a href="/">More</a><br>
                <a href="/">Fiction</a>
            </h1>
            <p>Read <a href="/">short stories</a> and <a href="/books">book reviews</a> by <a href="https://berveno.com" rel="noopener" target="_blank">Misha Berveno</a>. Follow the reading journal on <a href="https://www.instagram.com/mishaberveno" rel="noopener" target="_blank">Instagram</a>.</p>
            
            <form action="https://buttondown.com/api/emails/embed-subscribe/nofinalform" method="post">
                <input type="email" name="email" autocomplete="email" placeholder="Enter your email" onfocus="this.placeholder=''" onblur="this.placeholder='Enter your email'" />
                <span class="submit-wrap"><input type="submit" value="Subscribe"></span>
            </form>
        </div>
    </header>

    <main>
        {{ content }}
    </main>
</body>
</html>
